version: "3.9"

services:
  api:
    build: .
    container_name: express_api
    ports:
      - "3000:3000"           # Maps container port 3000 → localhost:3000
    env_file:
      - .env                  # Your local .env (will override DB host)
    depends_on:
      - postgres              # Ensure DB starts first
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"           # Local Postgres port
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: